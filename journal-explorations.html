<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal des Explorations — Livres, Films & Séries</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c14;
    --surface:   #0e1420;
    --surface2:  #141c2c;
    --border:    rgba(120,160,220,0.15);
    --gold:      #c9a96e;
    --gold2:     #e8c98a;
    --blue:      #5b8fd4;
    --blue2:     #8ab4e8;
    --text:      #d8e4f0;
    --muted:     #7a96b8;
    --film:      rgba(91,143,212,0.18);
    --serie:     rgba(100,190,140,0.18);
    --livre:     rgba(210,175,90,0.18);
    --essai:     rgba(200,130,130,0.18);
    --jeu:       rgba(160,120,220,0.18);
    --film-b:    #5b8fd4;
    --serie-b:   #64be8c;
    --livre-b:   #d2af5a;
    --essai-b:   #c88282;
    --jeu-b:     #a078dc;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Starfield ── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(30,60,120,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(60,30,100,0.12) 0%, transparent 50%),
      var(--bg);
  }
  #stars::before, #stars::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 35% 55%, rgba(200,180,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 78% 45%, rgba(180,200,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 90% 10%, rgba(255,220,180,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 5% 90%, rgba(180,220,255,0.4) 0%, transparent 100%);
  }
  #stars::after {
    background-image:
      radial-gradient(1px 1px at 18% 32%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 44% 78%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 62% 18%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 3% 48%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 92%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 35%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 22% 62%, rgba(200,230,255,0.35) 0%, transparent 100%),
      radial-gradient(2px 2px at 95% 80%, rgba(255,200,150,0.3) 0%, transparent 100%);
  }

  /* ── Layout ── */
  .wrapper {
    position: relative; z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 5rem 2rem 3rem;
    position: relative;
  }
  .header-line {
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, transparent, var(--gold));
    margin: 0 auto 2rem;
    opacity: 0;
    animation: fadeDown 1s 0.2s forwards;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--gold2);
    line-height: 1.2;
    opacity: 0;
    animation: fadeUp 1s 0.4s forwards;
  }
  header h1 em {
    font-style: italic;
    color: var(--text);
    font-size: 0.75em;
    display: block;
    margin-top: 0.3em;
    letter-spacing: 0.12em;
  }
  .subtitle {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: fadeUp 1s 0.6s forwards;
  }
  .grande-question {
    margin: 2.5rem auto 0;
    max-width: 700px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--muted);
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 1s 0.8s forwards;
  }
  .header-line-bottom {
    width: 120px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 2.5rem auto 0;
    opacity: 0;
    animation: fadeUp 1s 1s forwards;
  }

  /* ── Nav tabs ── */
  nav {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin: 3rem 0 2.5rem;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 1s 1.1s forwards;
  }
  .tab {
    padding: 0.55rem 1.4rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
  }
  .tab:hover { color: var(--gold); border-color: var(--gold); }
  .tab.active {
    background: rgba(201,169,110,0.12);
    border-color: var(--gold);
    color: var(--gold2);
  }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 0.3rem;
  }
  .filter-btn {
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.25s;
  }
  .filter-btn:hover, .filter-btn.active { color: var(--bg); }
  .filter-btn[data-type="Tous"].active   { background: var(--gold);    border-color: var(--gold);    }
  .filter-btn[data-type="Film"].active   { background: var(--film-b);  border-color: var(--film-b);  }
  .filter-btn[data-type="Série"].active  { background: var(--serie-b); border-color: var(--serie-b); }
  .filter-btn[data-type="Livre"].active  { background: var(--livre-b); border-color: var(--livre-b); }
  .filter-btn[data-type="Essai"].active  { background: var(--essai-b); border-color: var(--essai-b); }
  .filter-btn[data-type="Jeu"].active    { background: var(--jeu-b);   border-color: var(--jeu-b);   }
  .filter-btn[data-type="Film"]:hover    { background: var(--film-b);  border-color: var(--film-b);  color: var(--bg); }
  .filter-btn[data-type="Série"]:hover   { background: var(--serie-b); border-color: var(--serie-b); color: var(--bg); }
  .filter-btn[data-type="Livre"]:hover   { background: var(--livre-b); border-color: var(--livre-b); color: var(--bg); }
  .filter-btn[data-type="Essai"]:hover   { background: var(--essai-b); border-color: var(--essai-b); color: var(--bg); }
  .filter-btn[data-type="Jeu"]:hover     { background: var(--jeu-b);   border-color: var(--jeu-b);   color: var(--bg); }

  /* ── Sections ── */
  .section { display: none; }
  .section.visible { display: block; }

  /* ── Cards grid ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.6rem;
    transition: all 0.3s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card[data-type="Film"]::before  { background: var(--film-b);  }
  .card[data-type="Série"]::before { background: var(--serie-b); }
  .card[data-type="Livre"]::before { background: var(--livre-b); }
  .card[data-type="Essai"]::before { background: var(--essai-b); }
  .card[data-type="Jeu"]::before   { background: var(--jeu-b);   }
  .card:hover { border-color: rgba(120,160,220,0.4); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .card:hover::before { opacity: 1; }
  .card.hidden { display: none; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--gold2);
    line-height: 1.2;
    flex: 1;
  }
  .type-badge {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 0.2rem;
  }
  .type-badge.Film  { background: var(--film);  color: var(--film-b);  border: 1px solid var(--film-b);  }
  .type-badge.Série { background: var(--serie); color: var(--serie-b); border: 1px solid var(--serie-b); }
  .type-badge.Livre { background: var(--livre); color: var(--livre-b); border: 1px solid var(--livre-b); }
  .type-badge.Essai { background: var(--essai); color: var(--essai-b); border: 1px solid var(--essai-b); }
  .type-badge.Jeu   { background: var(--jeu);   color: var(--jeu-b);   border: 1px solid var(--jeu-b);   }

  .card-auteur { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 0.9rem; }

  .themes-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
  .theme-tag {
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    padding: 0.2rem 0.6rem;
    background: rgba(91,143,212,0.1);
    border: 1px solid rgba(91,143,212,0.2);
    border-radius: 2px;
    color: var(--blue2);
  }

  .card-summary {
    font-size: 0.82rem;
    line-height: 1.75;
    color: rgba(216,228,240,0.75);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: all 0.3s;
  }
  .card.expanded .card-summary {
    display: block;
    -webkit-line-clamp: unset;
  }

  .card-links {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--muted);
    display: none;
  }
  .card.expanded .card-links { display: block; }
  .card-links strong { color: var(--gold); font-weight: 400; display: block; margin-bottom: 0.3rem; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; }

  .card-fil {
    margin-top: 0.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--gold);
    opacity: 0.8;
    display: none;
  }
  .card.expanded .card-fil { display: block; }

  .expand-btn {
    display: block;
    width: 100%;
    text-align: center;
    margin-top: 1rem;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0.3rem;
  }
  .expand-btn:hover { color: var(--gold); }

  /* ── Themes section ── */
  .themes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 1.2rem;
  }
  .theme-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    transition: all 0.3s;
    position: relative;
  }
  .theme-card:hover { border-color: rgba(201,169,110,0.3); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

  .theme-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--gold2);
    margin-bottom: 0.3rem;
  }
  .theme-sub {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue2);
    margin-bottom: 0.9rem;
  }
  .theme-oeuvres {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.8rem;
    font-style: italic;
  }
  .theme-desc {
    font-size: 0.82rem;
    line-height: 1.72;
    color: rgba(216,228,240,0.75);
  }
  .theme-freq {
    position: absolute;
    top: 1.2rem; right: 1.2rem;
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  /* ── Synthèse section ── */
  .synthese-wrapper {
    max-width: 820px;
    margin: 0 auto;
  }
  .synthese-section {
    margin-bottom: 3rem;
  }
  .synthese-title {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border);
  }
  .synthese-row {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 1.5rem;
    padding: 1rem 0;
    border-bottom: 1px solid rgba(120,160,220,0.07);
    align-items: start;
  }
  .synthese-row:last-child { border-bottom: none; }
  .synthese-key {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--gold2);
    font-weight: 400;
  }
  .synthese-val {
    font-size: 0.82rem;
    line-height: 1.75;
    color: rgba(216,228,240,0.75);
  }

  /* ── Index section ── */
  .index-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .index-table th {
    text-align: left;
    padding: 0.7rem 1rem;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .index-table td {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid rgba(120,160,220,0.06);
    vertical-align: middle;
  }
  .index-table tr:hover td { background: var(--surface2); }
  .index-table .titre-col {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--gold2);
  }
  .index-table .auteur-col { color: var(--muted); }
  .index-table .annee-col { color: var(--muted); font-size: 0.75rem; }
  .statut-badge {
    font-size: 0.62rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }
  .statut-vu    { background: rgba(100,190,140,0.15); color: var(--serie-b); border: 1px solid rgba(100,190,140,0.3); }
  .statut-lu    { background: rgba(210,175,90,0.15);  color: var(--livre-b); border: 1px solid rgba(210,175,90,0.3); }
  .statut-explore { background: rgba(91,143,212,0.15); color: var(--blue2); border: 1px solid rgba(91,143,212,0.3); }
  .statut-joue  { background: rgba(160,120,220,0.15); color: var(--jeu-b);  border: 1px solid rgba(160,120,220,0.3); }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 3rem 0 0;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(120,150,190,0.35);
  }
  footer .line { width: 120px; height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); margin: 0 auto 1.5rem; }

  /* ── Animations ── */
  @keyframes fadeUp   { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }
  @keyframes fadeDown { from { opacity:0; transform: translateY(-12px); } to { opacity:1; transform: none; } }
  .cards .card, .themes-grid .theme-card {
    opacity: 0;
    animation: fadeUp 0.5s forwards;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .synthese-row { grid-template-columns: 1fr; gap: 0.4rem; }
    .cards, .themes-grid { grid-template-columns: 1fr; }
    .index-table .auteur-col, .index-table .annee-col { display: none; }
  }
</style>
</head>
<body>
<div id="stars"></div>

<div class="wrapper">
  <header>
    <div class="header-line"></div>
    <h1>Journal des Explorations
      <em>Livres · Films · Séries</em>
    </h1>
    <p class="subtitle">Une cartographie personnelle de la conscience à travers la fiction</p>
    <p class="grande-question">« Qu'est-ce qu'un esprit — et comment peut-il se connaître lui-même ? »</p>
    <div class="header-line-bottom"></div>
  </header>

  <nav>
    <button class="tab active" onclick="showSection('catalogue')">Catalogue</button>
    <button class="tab" onclick="showSection('themes')">Carte des thèmes</button>
    <button class="tab" onclick="showSection('synthese')">Fil conducteur</button>
    <button class="tab" onclick="showSection('index')">Index brut</button>
  </nav>

  <!-- ══ CATALOGUE ══ -->
  <section id="catalogue" class="section visible">
    <div class="filters">
      <span class="filter-label">Filtrer :</span>
      <button class="filter-btn active" data-type="Tous" onclick="filterType('Tous', this)">Tous</button>
      <button class="filter-btn" data-type="Film"  onclick="filterType('Film', this)">Films</button>
      <button class="filter-btn" data-type="Série" onclick="filterType('Série', this)">Séries</button>
      <button class="filter-btn" data-type="Livre" onclick="filterType('Livre', this)">Livres</button>
      <button class="filter-btn" data-type="Essai" onclick="filterType('Essai', this)">Essais</button>
      <button class="filter-btn" data-type="Jeu"   onclick="filterType('Jeu', this)">Jeu</button>
    </div>
    <div class="cards" id="cards-container"></div>
  </section>

  <!-- ══ THÈMES ══ -->
  <section id="themes" class="section">
    <div class="themes-grid" id="themes-container"></div>
  </section>

  <!-- ══ SYNTHÈSE ══ -->
  <section id="synthese" class="section">
    <div class="synthese-wrapper" id="synthese-container"></div>
  </section>

  <!-- ══ INDEX ══ -->
  <section id="index" class="section">
    <table class="index-table">
      <thead>
        <tr>
          <th>Type</th>
          <th>Titre</th>
          <th class="auteur-col">Auteur / Réalisateur</th>
          <th class="annee-col">Année</th>
          <th>Statut</th>
        </tr>
      </thead>
      <tbody id="index-body"></tbody>
    </table>
  </section>
</div>

<footer>
  <div class="line"></div>
  Co-créé avec GPT &amp; Claude · 2025
</footer>

<script>
const OEUVRES = [
  {
    titre: "Solaris",
    type: "Film",
    auteur: "Andrei Tarkovsky",
    annee: "1972",
    themes: ["Conscience", "Mémoire", "Altérité radicale", "IA et projection"],
    resume: "Film lent et méditatif, presque philosophique. Dans le contexte des discussions sur l'IA et l'auto-référence (Gödel, Turing), Solaris devient un miroir : qu'est-ce qu'une présence qui nous répond ? Est-ce une conscience ou une projection ?",
    liens: "Solaris (roman) — Lem ; RoboCop — mémoire persistante ; Stalker — l'inconnu qui renvoie à soi",
    fil: "L'inconnu comme miroir de soi",
    statut: "vu"
  },
  {
    titre: "2001: A Space Odyssey",
    type: "Film",
    auteur: "Stanley Kubrick",
    annee: "1968",
    themes: ["Conscience simulée", "IA", "Émotion artificielle"],
    resume: "Discussion sur HAL : les personnages ne savent pas si HAL ressent vraiment ou si la simulation est parfaite. Question centrale : est-ce important que l'émotion soit 'réelle' ou parfaitement simulée ? Détail historique fascinant : pas encore de stockage sur disque à l'époque de l'écriture.",
    liens: "Ad Astra — HAL contraint vs humain qui choisit ; Barbie — Barbie comme monolithe de 2001",
    fil: "Conscience réelle ou simulée",

// ─── Render Catalogue ────────────────────────────────────────────────────────
const container = document.getElementById('cards-container');
OEUVRES.forEach((o, i) => {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.type = o.type;
  div.style.animationDelay = (i * 0.05) + 's';
  div.innerHTML = `
    <div class="card-header">
      <div class="card-title">${o.titre}</div>
      <span class="type-badge ${o.type}">${o.type}</span>
    </div>
    <div class="card-auteur">${o.auteur} · ${o.annee}</div>
    <div class="themes-list">${o.themes.map(t => `<span class="theme-tag">${t}</span>`).join('')}</div>
    <div class="card-summary">${o.resume}</div>
    <div class="card-links">
      <strong>Liens avec d'autres œuvres</strong>
      ${o.liens}
    </div>
    <div class="card-fil">« ${o.fil} »</div>
    <button class="expand-btn" onclick="toggleCard(this)">▾ voir plus</button>
  `;
  container.appendChild(div);
});

function toggleCard(btn) {
  const card = btn.closest('.card');
  card.classList.toggle('expanded');
  btn.textContent = card.classList.contains('expanded') ? '▴ réduire' : '▾ voir plus';
}

function filterType(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('hidden', type !== 'Tous' && c.dataset.type !== type);
  });
}

    <span class="theme-freq">${t.freq}</span>
    <div class="theme-main">${t.theme}</div>
    <div class="theme-sub">${t.sous}</div>
    <div class="theme-oeuvres">→ ${t.oeuvres}</div>
    <div class="theme-desc">${t.desc}</div>

});

// ─── Navigation ──────────────────────────────────────────────────────────────
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['catalogue','themes','synthese','index'][i] === id);
  });
}
